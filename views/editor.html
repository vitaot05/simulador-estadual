<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Editor</title><link rel="stylesheet" href="../css/style.css"></head><body>
<header class="topbar"><strong>Editor de JSON</strong><div class="row"><label class="btn">Importar JSON<input id="import" type="file" accept="application/json" hidden></label><button id="download" class="btn btn-gold">Baixar JSON</button><button id="save-config" class="btn btn-purple">Usar em novo jogo</button><a class="btn" href="menu.html">Menu</a></div></header>
<main class="content"><div class="editor-layout"><section class="card" style="width:100%"><h2>Dados da competição</h2><div class="field"><label>ID</label><input id="id" class="input"></div><div class="field"><label>Zone</label><input id="zone" class="input"></div><div class="field"><label>Leagues, uma por linha</label><textarea id="leagues" style="min-height:112px"></textarea></div><div class="field"><label>Teams</label><div id="teams" class="team-list"></div></div><button id="add-team" class="btn">Adicionar time</button><div id="validation" class="notice muted"></div></section><section class="card" style="width:100%"><h2>JSON textual</h2><p class="muted">Edite livremente e clique em “Aplicar JSON”. Chaves principais: id, zone, leagues e teams.</p><textarea id="json"></textarea><div class="row" style="margin-top:10px"><button id="apply-json" class="btn btn-purple">Aplicar JSON</button></div></section></div></main><script type="module" src="../js/editor.js"></script></body></html>
