<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Editor</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="../css/style.css"></head><body>
<header class="topbar"><div class="brand"><div class="brand-icon"><i class="fa-solid fa-code"></i></div><strong>Editor de JSON</strong></div><div class="row"><label class="btn"><i class="fa-solid fa-file-import"></i>Importar JSON<input id="import" type="file" accept="application/json" hidden></label><button id="download" class="btn btn-gold"><i class="fa-solid fa-download"></i>Baixar JSON</button><button id="save-config" class="btn btn-purple"><i class="fa-solid fa-play"></i>Enviar para novo jogo</button><a class="btn" href="menu.html"><i class="fa-solid fa-house"></i>Menu</a></div></header>
<main class="content"><div class="editor-layout"><section class="card" style="width:100%"><h2 class="section-title"><i class="fa-solid fa-sitemap"></i>Dados da competição</h2><div class="field"><label>ID</label><input id="id" class="input"></div><div class="field"><label>Zone</label><input id="zone" class="input"></div><div class="field"><label>Leagues, uma por linha</label><textarea id="leagues" style="min-height:112px"></textarea></div><div class="hint"><i class="fa-solid fa-circle-info"></i> Reputação: 1 Municipal, 2 Estadual, 3 Regional, 4 Nacional, 5 Continental, 6 Intercontinental, 7 Mundial. A força real é sorteada ao iniciar novo jogo.</div><div class="field"><label>Teams</label><div id="teams" class="team-list"></div></div><button id="add-team" class="btn"><i class="fa-solid fa-plus"></i>Adicionar time</button><div id="validation" class="notice muted"></div></section><section class="card" style="width:100%"><h2 class="section-title"><i class="fa-solid fa-file-code"></i>JSON textual</h2><p class="muted">Edite livremente e clique em “Aplicar JSON”. Chaves principais: id, zone, leagues e teams.</p><textarea id="json"></textarea><div class="row" style="margin-top:10px"><button id="apply-json" class="btn btn-purple"><i class="fa-solid fa-check"></i>Aplicar JSON</button></div></section></div></main><script type="module" src="../js/editor.js"></script></body></html>
