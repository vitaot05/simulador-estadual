<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Jogo</title><link rel="stylesheet" href="../css/style.css"></head><body>
<header class="topbar"><div><strong id="zone">Avanci Football Simulator</strong> <span class="pill" id="season"></span></div><div class="row"><span class="pill" id="round"></span><a class="btn" href="menu.html">Menu</a></div></header>
<div class="app"><aside class="sidebar"><div class="sec-label">Divisões</div><div id="league-nav"></div><div class="sep"></div><button class="btn btn-gold" id="sim-round">Simular rodada</button><button class="btn" id="sim-season">Simular temporada</button><button class="btn" id="save">Salvar no navegador</button><button class="btn" id="export">Exportar save JSON</button><label class="btn">Importar save JSON<input id="import" type="file" accept="application/json" hidden></label><div class="sep"></div><div class="nav-item active" data-panel="panel-table">Classificação</div><div class="nav-item" data-panel="panel-results">Últimos resultados</div><div class="nav-item" data-panel="panel-history">Histórico</div></aside>
<main class="content"><section id="panel-table" class="panel"><h2 id="view-title"></h2><p class="muted" id="league-note"></p><div class="tbl-wrap"><table><thead><tr><th>Clube</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead><tbody id="tbody"></tbody></table></div></section><section id="panel-results" class="panel hidden"><h2>Últimos resultados</h2><div id="results"></div></section><section id="panel-history" class="panel hidden"><h2>Histórico</h2><div id="history"></div></section></main></div><script type="module" src="../js/game.js"></script></body></html>
