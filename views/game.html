<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Jogo</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="../css/style.css"></head><body>
<header class="topbar"><div class="brand"><div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div><div><strong id="zone">Avanci Football Simulator</strong><br><span class="muted">Liga em andamento</span></div></div><div class="row"><span class="pill" id="season"></span><span class="pill" id="round"></span><a class="btn" href="menu.html"><i class="fa-solid fa-house"></i>Menu</a></div></header>
<div class="app"><aside class="sidebar"><div class="sec-label">Divisões</div><div id="league-nav"></div><div class="sep"></div><button class="btn btn-gold" id="sim-round"><i class="fa-solid fa-forward-step"></i>Simular rodada</button><button class="btn" id="sim-season"><i class="fa-solid fa-bolt"></i>Simular temporada</button><button class="btn" id="save"><i class="fa-solid fa-floppy-disk"></i>Salvar no navegador</button><button class="btn" id="export"><i class="fa-solid fa-file-export"></i>Exportar save JSON</button><label class="btn"><i class="fa-solid fa-file-import"></i>Importar save JSON<input id="import" type="file" accept="application/json" hidden></label><div class="sep"></div><div class="nav-item active" data-panel="panel-table"><i class="fa-solid fa-table-list"></i>Classificação</div><div class="nav-item" data-panel="panel-results"><i class="fa-solid fa-futbol"></i>Últimos resultados</div><div class="nav-item" data-panel="panel-history"><i class="fa-solid fa-trophy"></i>Histórico</div></aside>
<main class="content"><div class="manager-header"><div><div class="muted" id="dash-zone">-</div><h1 id="dash-season">-</h1></div><div class="round-box"><span class="muted">Rodada</span><strong id="dash-round">-</strong></div></div><section id="panel-table" class="panel"><div class="section-head"><div><h2 class="section-title"><i class="fa-solid fa-ranking-star"></i><span id="view-title"></span></h2><p class="muted" id="league-note"></p></div><div class="legend-mini"><span><i class="fa-solid fa-arrow-up good"></i> acesso</span><span><i class="fa-solid fa-arrow-down bad"></i> queda</span></div></div><div class="tbl-wrap"><table class="standings-table"><thead><tr><th class="pos-col">#</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div></section><section id="panel-results" class="panel hidden"><h2 class="section-title"><i class="fa-solid fa-futbol"></i>Últimos resultados</h2><div id="results"></div></section><section id="panel-history" class="panel hidden"><h2 class="section-title"><i class="fa-solid fa-trophy"></i>Histórico</h2><div id="history"></div></section></main></div><script type="module" src="../js/game.js"></script></body></html>
